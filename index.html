<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدرس التفاعلية</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 800px; width: 100%; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; color: #1a2b4c; margin-bottom: 20px; border-right: 5px solid #3b82f6; padding-right: 15px; }
        h4 { color: #1a2b4c; margin: 10px 0; }
        label { font-weight: 600; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-family: inherit; margin-bottom: 5px; }
        textarea { min-height: 80px; resize: vertical; }
        .btn { border: none; padding: 10px 18px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; display: inline-block; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-sm { font-size: 12px; padding: 4px 12px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .room-box { background: #f8fafc; padding: 15px; border-radius: 14px; border: 2px solid #cbd5e1; display: flex; gap: 10px; flex-wrap: wrap; }
        .room-box input { flex: 2; min-width: 150px; margin: 0; }
        .badge { background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 20px; font-size: 13px; display: inline-block; }
        .question-area { background: #f8fafc; padding: 15px; border-radius: 14px; margin: 15px 0; border: 2px dashed #cbd5e1; }
        .question-input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .question-input-group input { flex: 1; min-width: 150px; }
        #questionsList { list-style: none; margin-top: 10px; }
        #questionsList li { background: white; padding: 8px 14px; margin-bottom: 6px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; flex-wrap: wrap; }
        .q-text { flex: 1; padding-left: 8px; }
        .q-num { background: #e2e8f0; color: #334155; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; font-weight: 700; margin-left: 8px; }
        .summary-box { background: #f1f5f9; padding: 16px; border-radius: 14px; line-height: 1.8; margin: 10px 0 20px; white-space: pre-wrap; }
        .student-question-item { background: white; padding: 12px 16px; margin-bottom: 10px; border-radius: 14px; border-right: 4px solid #3b82f6; }
        .student-question-item .num { font-weight: 700; color: #3b82f6; margin-left: 8px; }
        .answer-box { background: #f1f5f9; padding: 8px 12px; border-radius: 10px; margin-top: 6px; }
        .answer-box textarea { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; min-height: 40px; }
        .student-view { display: none; }
        .teacher-view { display: none; }
        .msg { background: #fef9c3; color: #854d0e; padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 14px; text-align: center; display: none; }
        .msg.success { background: #dcfce7; color: #166534; display: block; }
        .msg.error { background: #fee2e2; color: #991b1b; display: block; }
        .answers-section { margin-top: 15px; border-top: 2px solid #e2e8f0; padding-top: 15px; }
        .answer-item { background: #f1f5f9; padding: 6px 12px; border-radius: 8px; margin: 4px 0; }
        .name-prompt { background: #f8fafc; padding: 15px; border-radius: 14px; margin: 10px 0; display: none; border: 2px solid #3b82f6; }
        .name-prompt .input-group { display: flex; gap: 10px; margin-top: 8px; }
        .name-prompt .input-group input { flex: 1; margin: 0; }
        .question-count { font-size: 13px; color: #4b5563; margin-top: 5px; }
        .danger-zone { background: #fee2e2; border: 2px solid #ef4444; border-radius: 14px; padding: 15px; margin-top: 15px; }
        .danger-zone h4 { color: #dc2626; margin-bottom: 10px; }
        .student-answer-row { border-bottom: 1px solid #e2e8f0; padding: 8px 0; }
        .student-answer-row .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px; }
        .teacher-msg { background: #d1fae5; padding: 6px 12px; border-radius: 8px; margin-top: 4px; color: #065f46; }
        .leaderboard { background: #f8fafc; padding: 10px 15px; border-radius: 14px; margin: 10px 0; border: 1px solid #cbd5e1; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #e2e8f0; }
        .leaderboard-item:last-child { border-bottom: none; }
        .score-badge { background: #3b82f6; color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; }
        /* زر تحميل الملف للطالب */
        .file-download-btn { display: inline-block; background: #3b82f6; color: white; padding: 6px 14px; border-radius: 30px; text-decoration: none; font-size: 14px; font-weight: 600; margin-top: 5px; }
        .file-download-btn:hover { background: #2563eb; }
        @media (max-width: 600px) { .container { padding: 15px; } .question-input-group { flex-direction: column; } .room-box { flex-direction: column; } .name-prompt .input-group { flex-direction: column; } .student-answer-row .flex-row { flex-direction: column; align-items: flex-start; gap: 8px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 منصة الدرس التفاعلية</h1>

    <div class="room-box">
        <input type="text" id="roomInput" placeholder="كود الغرفة (مثال: phys3)" />
        <button class="btn btn-primary" id="teacherBtn">👨‍🏫 معلم</button>
        <button class="btn btn-success" id="studentBtn">🧑‍🎓 طالب</button>
    </div>
    <div id="statusMsg" class="msg"></div>

    <div id="teacherMode" class="teacher-view"></div>

    <div id="studentMode" class="student-view">
        <span class="badge">🧑‍🎓 الطالب - الغرفة: <span id="studentRoom"></span></span>
        <div id="teacherMessageContainer" style="display:none;"></div>
        <div id="studentNamePrompt" class="name-prompt">
            <label style="font-weight:600;">👤 أدخل اسمك (سيظهر مع إجابتك):</label>
            <div class="input-group">
                <input type="text" id="studentNameInput" placeholder="مثال: أحمد محمد" />
                <button class="btn btn-primary" id="studentNameSubmitBtn">✅ حفظ الاسم</button>
            </div>
        </div>
        <div id="studentTitle" style="font-size:22px;margin-top:10px;"></div>
        <div class="summary-box" id="studentSummary"></div>
        <div id="studentQuestions"></div>
        <div id="studentStatus" style="margin-top:10px;color:#4b5563;"></div>
        <div id="studentLeaderboard" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    // ============================================================
    // 1. إعدادات التطبيق
    // ============================================================
    const TEACHER_PASSWORD = 'sa';

    // ============================================================
    // 2. تهيئة Firebase (ضع بياناتك هنا)
    // ============================================================
    const firebaseConfig = {


  apiKey: "AIzaSyBGHfqTJF-XE-sFTZeQa4H6hin7zD698YY",


  authDomain: "learning-platform-3034b.firebaseapp.com",


  databaseURL: "https://learning-platform-3034b-default-rtdb.europe-west1.firebasedatabase.app",


  projectId: "learning-platform-3034b",


  storageBucket: "learning-platform-3034b.firebasestorage.app",


  messagingSenderId: "846645004823",


  appId: "1:846645004823:web:8b90ced21fb6f468cdea52"


};




    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    // ============================================================
    // 3. المتغيرات العامة
    // ============================================================
    let currentRoom = '';
    let questions = [];
    let teacherListener = null;
    let answerListener = null;
    let currentStudentId = null;

    // ============================================================
    // 4. المراجع الأساسية
    // ============================================================
    const roomInput = document.getElementById('roomInput');
    const teacherBtn = document.getElementById('teacherBtn');
    const studentBtn = document.getElementById('studentBtn');
    const studentMode = document.getElementById('studentMode');
    const statusMsg = document.getElementById('statusMsg');
    const studentRoom = document.getElementById('studentRoom');
    const studentTitle = document.getElementById('studentTitle');
    const studentSummary = document.getElementById('studentSummary');
    const studentQuestions = document.getElementById('studentQuestions');
    const studentStatus = document.getElementById('studentStatus');
    const studentLeaderboard = document.getElementById('studentLeaderboard');
    const namePrompt = document.getElementById('studentNamePrompt');
    const nameInput = document.getElementById('studentNameInput');
    const nameSubmitBtn = document.getElementById('studentNameSubmitBtn');
    const teacherMsgContainer = document.getElementById('teacherMessageContainer');

    // ============================================================
    // 5. دوال مساعدة
    // ============================================================
    function showMsg(text, type = 'success') {
        statusMsg.textContent = text;
        statusMsg.className = 'msg ' + type;
        statusMsg.style.display = 'block';
        setTimeout(() => statusMsg.style.display = 'none', 5000);
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // ============================================================
    // 6. إدارة واجهة المعلم (إنشاء/حذف)
    // ============================================================
    let teacherModeElement = null;

    function createTeacherMode() {
        if (document.getElementById('teacherMode')) return;
        const teacherHTML = `
            <span class="badge">👩‍🏫 المعلم - الغرفة: <span id="teacherRoom"></span></span>
            <label>📖 عنوان الدرس</label>
            <input type="text" id="lessonTitle" placeholder="مثال: درس الدفع" />
            <label>📝 ملاحظات على الدرس</label>
            <textarea id="lessonSummary" placeholder="اكتب الملاحظات هنا..."></textarea>
            <div class="question-area">
                <label>❓ إضافة سؤال جديد</label>
                <div class="question-input-group">
                    <input type="text" id="questionInput" placeholder="نص السؤال..." />
                    <input type="file" id="fileInput" accept="image/*,application/pdf" />
                    <button class="btn btn-primary" id="addBtn">➕ أضف</button>
                </div>
                <div id="questionCount" class="question-count">📌 عدد الأسئلة: 0</div>
                <ul id="questionsList"></ul>
            </div>
            <button class="btn btn-success" id="saveBtn">💾 حفظ الدرس</button>
            <div class="answers-section">
                <h4>📨 إجابات الطلاب</h4>
                <div id="answersContainer">لا توجد إجابات بعد.</div>
                <h4 style="margin-top:10px;">🏆 لوحة المتصدرين</h4>
                <div id="teacherLeaderboard">لا توجد نقاط بعد.</div>
            </div>
            <div class="danger-zone">
                <h4>⚠️ منطقة المسح الشامل</h4>
                <p style="font-size:13px;color:#6b7280;margin-bottom:10px;">تحذير: هذه العمليات لا يمكن التراجع عنها!</p>
                <div class="btn-group">
                    <button class="btn btn-danger" id="clearQuestionsBtn">🗑️ مسح الأسئلة</button>
                    <button class="btn btn-danger" id="clearAnswersBtn">🗑️ مسح الإجابات</button>
                    <button class="btn btn-warning" id="clearAllBtn">🔥 مسح شامل</button>
                    <button class="btn btn-danger" id="clearLocalBtn">🗑️ مسح بيانات الطالب</button>
                </div>
            </div>
        `;
        const roomBox = document.querySelector('.room-box');
        const teacherDiv = document.createElement('div');
        teacherDiv.id = 'teacherMode';
        teacherDiv.className = 'teacher-view';
        teacherDiv.innerHTML = teacherHTML;
        roomBox.insertAdjacentElement('afterend', teacherDiv);
        bindTeacherEvents();
    }

    function removeTeacherMode() {
        const el = document.getElementById('teacherMode');
        if (el) el.remove();
    }

    // ============================================================
    // 7. ربط أحداث واجهة المعلم
    // ============================================================
    function bindTeacherEvents() {
        const teacherRoom = document.getElementById('teacherRoom');
        const lessonTitle = document.getElementById('lessonTitle');
        const lessonSummary = document.getElementById('lessonSummary');
        const questionInput = document.getElementById('questionInput');
        const fileInput = document.getElementById('fileInput');
        const addBtn = document.getElementById('addBtn');
        const questionsList = document.getElementById('questionsList');
        const questionCount = document.getElementById('questionCount');
        const saveBtn = document.getElementById('saveBtn');
        const answersContainer = document.getElementById('answersContainer');
        const teacherLeaderboard = document.getElementById('teacherLeaderboard');
        const clearQuestionsBtn = document.getElementById('clearQuestionsBtn');
        const clearAnswersBtn = document.getElementById('clearAnswersBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const clearLocalBtn = document.getElementById('clearLocalBtn');

        window.renderQuestions = function() {
            questionCount.textContent = '📌 عدد الأسئلة: ' + questions.length;
            if (!questions.length) {
                questionsList.innerHTML = '<li style="color:#94a3b8;border:none;">📭 لا توجد أسئلة</li>';
                return;
            }
            questionsList.innerHTML = questions.map((q, i) => `
                <li>
                    <span class="q-num">${i+1}</span>
                    <span class="q-text">${escapeHtml(q.text)}</span>
                    ${q.fileURL ? `<a href="${q.fileURL}" target="_blank" style="margin:0 5px;font-size:12px;">📎 ملف</a>` : ''}
                    <button class="btn btn-danger btn-sm" onclick="removeQ(${i})">✖</button>
                </li>
            `).join('');
        };

        window.removeQ = function(index) {
            questions.splice(index, 1);
            renderQuestions();
            showMsg('🗑️ تم حذف السؤال', 'success');
        };

        window.saveLesson = function() {
            if (!currentRoom) { showMsg('⚠️ حدد الغرفة أولاً', 'error'); return; }
            db.ref('rooms/' + currentRoom + '/teacher').set({
                title: lessonTitle.value.trim(),
                summary: lessonSummary.value.trim(),
                questions: questions
            }).then(() => showMsg('✅ تم حفظ الدرس بنجاح')).catch(err => showMsg('❌ خطأ: ' + err.message, 'error'));
        };

        addBtn.onclick = function() {
            const text = questionInput.value.trim();
            if (!text) { showMsg('⚠️ اكتب السؤال أولاً', 'error'); return; }

            const file = fileInput.files[0];
            if (file) {
                const storageRef = storage.ref('rooms/' + currentRoom + '/files/' + Date.now() + '_' + file.name);
                const uploadTask = storageRef.put(file);
                uploadTask.on('state_changed', null, null, function() {
                    uploadTask.snapshot.ref.getDownloadURL().then(function(downloadURL) {
                        questions.push({ text: text, fileURL: downloadURL, fileName: file.name });
                        questionInput.value = '';
                        fileInput.value = '';
                        renderQuestions();
                        showMsg('✅ تمت إضافة السؤال مع الملف', 'success');
                        questionInput.focus();
                    });
                });
            } else {
                questions.push({ text: text });
                questionInput.value = '';
                renderQuestions();
                showMsg('✅ تمت إضافة السؤال', 'success');
                questionInput.focus();
            }
        };

        saveBtn.onclick = window.saveLesson;

        clearQuestionsBtn.onclick = function() {
            if (!currentRoom) { showMsg('⚠️ لا توجد غرفة مفتوحة', 'error'); return; }
            if (!confirm('🗑️ مسح جميع الأسئلة؟')) return;
            questions = [];
            renderQuestions();
            showMsg('✅ تم مسح الأسئلة');
        };

        clearAnswersBtn.onclick = function() {
            if (!currentRoom) { showMsg('⚠️ لا توجد غرفة مفتوحة', 'error'); return; }
            if (!confirm('🗑️ مسح جميع إجابات الطلاب؟')) return;
            db.ref('rooms/' + currentRoom + '/answers').remove()
                .then(() => showMsg('✅ تم مسح الإجابات'))
                .catch(err => showMsg('❌ خطأ: ' + err.message, 'error'));
        };

        clearAllBtn.onclick = function() {
            if (!currentRoom) { showMsg('⚠️ لا توجد غرفة مفتوحة', 'error'); return; }
            if (!confirm('🔥 مسح كل شيء؟')) return;
            questions = [];
            renderQuestions();
            db.ref('rooms/' + currentRoom + '/answers').remove().catch(err => console.error(err));
            localStorage.removeItem('studentName_' + currentRoom);
            localStorage.removeItem('studentId_' + currentRoom);
            lessonTitle.value = '';
            lessonSummary.value = '';
            answersContainer.innerHTML = 'لا توجد إجابات.';
            teacherLeaderboard.innerHTML = 'لا توجد نقاط بعد.';
            showMsg('🔥 تم مسح كل شيء');
        };

        clearLocalBtn.onclick = function() {
            if (!currentRoom) { showMsg('⚠️ لا توجد غرفة مفتوحة', 'error'); return; }
            if (!confirm('🗑️ مسح بيانات الطالب المحلية؟')) return;
            localStorage.removeItem('studentName_' + currentRoom);
            localStorage.removeItem('studentId_' + currentRoom);
            showMsg('✅ تم مسح البيانات المحلية');
            if (studentMode.style.display === 'block') loadStudent(currentRoom);
        };

        loadTeacher(currentRoom);
    }

    // ============================================================
    // 8. دوال المعلم
    // ============================================================
    function loadTeacher(room) {
        if (teacherListener) { teacherListener.off(); teacherListener = null; }
        if (answerListener) { answerListener.off(); answerListener = null; }

        currentRoom = room;
        const teacherMode = document.getElementById('teacherMode');
        if (teacherMode) teacherMode.style.display = 'block';
        studentMode.style.display = 'none';

        const teacherRoom = document.getElementById('teacherRoom');
        if (teacherRoom) teacherRoom.textContent = room;

        teacherListener = db.ref('rooms/' + room + '/teacher');
        teacherListener.on('value', snap => {
            const data = snap.val();
            const titleInput = document.getElementById('lessonTitle');
            const summaryInput = document.getElementById('lessonSummary');
            if (data) {
                if (titleInput) titleInput.value = data.title || '';
                if (summaryInput) summaryInput.value = data.summary || '';
                questions = data.questions || [];
                renderQuestions();
            } else {
                if (titleInput) titleInput.value = '';
                if (summaryInput) summaryInput.value = '';
                questions = [];
                renderQuestions();
            }
        });

        answerListener = db.ref('rooms/' + room + '/answers');
        answerListener.on('value', snap => {
            const all = snap.val();
            const container = document.getElementById('answersContainer');
            const leaderboard = document.getElementById('teacherLeaderboard');

            if (!all) {
                container.innerHTML = 'لا توجد إجابات.';
                leaderboard.innerHTML = 'لا توجد نقاط بعد.';
                return;
            }

            let html = '';
            let leaderboardHtml = '';
            let scores = [];

            Object.keys(all).forEach(sid => {
                const entry = all[sid];
                const name = entry.name || 'طالب';
                const ans = entry.answers || {};
                const msg = entry.teacherMessage || '';
                const score = entry.score || 0;

                scores.push({ name, score, sid });

                html += `<div class="student-answer-row">`;
                html += `<div class="flex-row">`;
                html += `<strong>👤 ${escapeHtml(name)}</strong>`;
                html += `<span>⭐ النقاط: ${score}</span>`;
                html += `<button class="btn btn-success btn-sm" onclick="addScore('${room}','${sid}')">➕ نقطة</button>`;
                html += `<button class="btn btn-danger btn-sm" onclick="subtractScore('${room}','${sid}')">➖ نقطة</button>`;
                html += `<button class="btn btn-primary btn-sm" onclick="openThankMessage('${room}','${sid}')">💬 شكر</button>`;
                html += `</div>`;

                for (let i = 0; i < questions.length; i++) {
                    const answerText = ans[i] || '(لم يجب)';
                    html += `<div class="answer-item">س${i+1}: ${escapeHtml(answerText)}</div>`;
                }

                if (msg) {
                    html += `<div class="teacher-msg">💌 رسالة المعلم: ${escapeHtml(msg)}</div>`;
                }
                html += '</div>';
            });
            container.innerHTML = html;

            scores.sort((a, b) => b.score - a.score);
            if (scores.length === 0) {
                leaderboard.innerHTML = 'لا توجد نقاط بعد.';
            } else {
                leaderboardHtml = scores.map((item, index) => `
                    <div class="leaderboard-item">
                        <span>${index+1}. ${escapeHtml(item.name)}</span>
                        <span class="score-badge">⭐ ${item.score}</span>
                    </div>
                `).join('');
                leaderboard.innerHTML = `<div class="leaderboard">${leaderboardHtml}</div>`;
            }
        });
    }

    window.addScore = function(room, sid) {
        const ref = db.ref('rooms/' + room + '/answers/' + sid + '/score');
        ref.transaction(current => (current || 0) + 1);
    };

    window.subtractScore = function(room, sid) {
        const ref = db.ref('rooms/' + room + '/answers/' + sid + '/score');
        ref.transaction(current => Math.max(0, (current || 0) - 1));
    };

    window.openThankMessage = function(room, sid) {
        const message = prompt('✏️ اكتب رسالة شكر للطالب:');
        if (message === null) return;
        if (message.trim() === '') { alert('⚠️ الرسالة لا يمكن أن تكون فارغة'); return; }
        db.ref('rooms/' + room + '/answers/' + sid + '/teacherMessage').set(message.trim())
            .then(() => showMsg('✅ تم إرسال رسالة الشكر'))
            .catch(err => showMsg('❌ خطأ: ' + err.message, 'error'));
    };

    // ============================================================
    // 9. دوال الطالب (مع زر تحميل الملف)
    // ============================================================
    function loadStudent(room) {
        if (teacherListener) { teacherListener.off(); teacherListener = null; }
        if (answerListener) { answerListener.off(); answerListener = null; }

        currentRoom = room;
        removeTeacherMode();
        studentMode.style.display = 'block';
        studentRoom.textContent = room;

        let studentName = localStorage.getItem('studentName_' + room);
        if (studentName) {
            namePrompt.style.display = 'none';
            fetchStudentData(room);
        } else {
            namePrompt.style.display = 'block';
            nameInput.value = '';
            nameSubmitBtn.onclick = function() {
                const name = nameInput.value.trim();
                if (!name) { alert('الرجاء كتابة اسمك'); return; }
                localStorage.setItem('studentName_' + room, name);
                namePrompt.style.display = 'none';
                fetchStudentData(room);
            };
            studentTitle.textContent = '👋 مرحباً! أدخل اسمك أولاً';
            studentSummary.textContent = '';
            studentQuestions.innerHTML = '';
            studentStatus.textContent = '';
            studentLeaderboard.innerHTML = '';
        }
    }

    function fetchStudentData(room) {
        studentTitle.textContent = '⏳ جاري تحميل الدرس...';
        studentSummary.textContent = '';
        studentQuestions.innerHTML = '';
        studentStatus.textContent = '';
        studentLeaderboard.innerHTML = '';

        db.ref('rooms/' + room + '/teacher').once('value').then(snapshot => {
            const data = snapshot.val();
            if (!data) {
                studentTitle.textContent = '⚠️ لم ينشئ المعلم الدرس بعد.';
                studentSummary.textContent = 'انتظر حتى يحفظ المعلم المحتوى.';
                studentQuestions.innerHTML = '';
                studentStatus.textContent = '';
                return;
            }

            studentTitle.textContent = data.title || 'عنوان الدرس';
            studentSummary.textContent = data.summary || 'لا يوجد ملاحظات.';
            const qs = data.questions || [];

            if (!qs.length) {
                studentQuestions.innerHTML = '<p style="color:#94a3b8;">📭 لا توجد أسئلة.</p>';
                studentStatus.textContent = '';
                return;
            }

            let html = '';
            qs.forEach((q, i) => {
                html += `<div class="student-question-item">`;
                html += `<div><span class="num">سؤال ${i+1}:</span> ${escapeHtml(q.text)}</div>`;
                // ===== زر تحميل الملف للطالب (تم تفعيله) =====
                if (q.fileURL) {
                    html += `<div style="margin-top:8px;">
                        <a href="${q.fileURL}" target="_blank" class="file-download-btn">
                            📥 تحميل الملف المرفق
                        </a>
                    </div>`;
                }
                html += `<div class="answer-box"><textarea id="ans_${i}" placeholder="اكتب إجابتك هنا..." rows="2"></textarea></div>`;
                html += `</div>`;
            });
            html += `<button class="btn btn-success" id="submitBtn" style="margin-top:10px;">📨 إرسال الإجابات</button>`;
            studentQuestions.innerHTML = html;
            studentStatus.textContent = '🔹 يمكنك إرسال إجاباتك (سيظهر تحديث للمعلم)';

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.onclick = function() {
                const answers = {};
                for (let i = 0; i < qs.length; i++) {
                    const ta = document.getElementById('ans_' + i);
                    if (ta) answers[i] = ta.value.trim();
                }
                const studentName = localStorage.getItem('studentName_' + room) || 'طالب';
                let studentId = localStorage.getItem('studentId_' + room);
                if (!studentId) {
                    studentId = 's_' + Date.now() + '_' + Math.random().toString(36).substring(2,5);
                    localStorage.setItem('studentId_' + room, studentId);
                }
                currentStudentId = studentId;
                db.ref('rooms/' + room + '/answers/' + studentId).set({
                    name: studentName,
                    answers: answers,
                    score: 0
                }).then(() => showMsg('✅ تم إرسال إجاباتك')).catch(err => showMsg('❌ خطأ: ' + err.message, 'error'));
            };

        }).catch(err => {
            studentTitle.textContent = '⚠️ خطأ في الاتصال';
            studentSummary.textContent = 'تأكد من اتصالك بالإنترنت وحاول مرة أخرى.';
            studentQuestions.innerHTML = '';
            studentStatus.textContent = '';
            console.error(err);
        });

        const studentId = localStorage.getItem('studentId_' + room);
        if (studentId) {
            db.ref('rooms/' + room + '/answers/' + studentId + '/teacherMessage').on('value', snap => {
                const msg = snap.val();
                if (msg) {
                    teacherMsgContainer.innerHTML = `<div style="background:#d1fae5; padding:12px 16px; border-radius:12px; border-right:4px solid #10b981; margin:10px 0;">
                        💌 <strong>رسالة من المعلم:</strong> ${escapeHtml(msg)}
                    </div>`;
                    teacherMsgContainer.style.display = 'block';
                } else {
                    teacherMsgContainer.style.display = 'none';
                }
            });

            db.ref('rooms/' + room + '/answers/' + studentId + '/score').on('value', snap => {
                const score = snap.val() || 0;
                studentLeaderboard.innerHTML = `<div class="leaderboard"><div class="leaderboard-item"><span>⭐ نقاطي</span><span class="score-badge">${score}</span></div></div>`;
            });
        }
    }

    // ============================================================
    // 10. أحداث الأزرار الأساسية
    // ============================================================
    teacherBtn.onclick = function() {
        const room = roomInput.value.trim();
        if (!room) { showMsg('⚠️ أدخل كود الغرفة', 'error'); return; }
        const password = prompt('🔐 أدخل كلمة مرور المعلم:');
        if (password !== TEACHER_PASSWORD) { showMsg('❌ كلمة المرور غير صحيحة!', 'error'); return; }
        createTeacherMode();
        currentRoom = room;
        loadTeacher(room);
        showMsg('✅ دخلت كمعلم في الغرفة ' + room);
    };

    studentBtn.onclick = function() {
        const room = roomInput.value.trim();
        if (!room) { showMsg('⚠️ أدخل كود الغرفة', 'error'); return; }
        loadStudent(room);
        showMsg('✅ دخلت كطالب في الغرفة ' + room);
    };

    // ============================================================
    // 11. بدء التشغيل
    // ============================================================
    removeTeacherMode();
    studentMode.style.display = 'none';
    if (firebaseConfig.apiKey === 'AIzaSy...') {
        showMsg('⚠️ يرجى تهيئة Firebase في الكود (انظر تعليمات الإعداد)', 'error');
    }
    console.log('✅ التطبيق مع زر تحميل الملف للطالب (تأكد من حفظ الدرس أولاً)');
</script>
</body>
