<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدرس التفاعلية</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 700px; width: 100%; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; color: #1a2b4c; margin-bottom: 20px; border-right: 5px solid #3b82f6; padding-right: 15px; }
        label { font-weight: 600; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-family: inherit; margin-bottom: 5px; }
        textarea { min-height: 100px; resize: vertical; }
        .btn { border: none; padding: 10px 18px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; display: inline-block; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .room-box { background: #f8fafc; padding: 15px; border-radius: 14px; border: 2px solid #cbd5e1; display: flex; gap: 10px; flex-wrap: wrap; }
        .room-box input { flex: 2; min-width: 150px; margin: 0; }
        .badge { background: #dbeafe; color: #1e40af; padding: 4px 12px; border-radius: 20px; font-size: 13px; display: inline-block; }
        .question-area { background: #f8fafc; padding: 15px; border-radius: 14px; margin: 15px 0; border: 2px dashed #cbd5e1; }
        .question-input-group { display: flex; gap: 10px; }
        .question-input-group input { flex: 1; }
        #questionsList { list-style: none; margin-top: 10px; }
        #questionsList li { background: white; padding: 8px 14px; margin-bottom: 6px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; }
        .q-text { flex: 1; padding-left: 8px; }
        .q-num { background: #e2e8f0; color: #334155; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; font-weight: 700; margin-left: 8px; }
        .summary-box { background: #f1f5f9; padding: 16px; border-radius: 14px; line-height: 1.8; margin: 10px 0 20px; white-space: pre-wrap; }
        .student-question-item { background: white; padding: 12px 16px; margin-bottom: 10px; border-radius: 14px; border-right: 4px solid #3b82f6; }
        .student-question-item .num { font-weight: 700; color: #3b82f6; margin-left: 8px; }
        .answer-box { background: #f1f5f9; padding: 8px 12px; border-radius: 10px; margin-top: 6px; }
        .answer-box textarea { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; min-height: 40px; }
        .student-view { display: none; }
        .teacher-view { display: none; }
        .msg { background: #fef9c3; color: #854d0e; padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 14px; text-align: center; display: none; }
        .msg.success { background: #dcfce7; color: #166534; display: block; }
        .msg.error { background: #fee2e2; color: #991b1b; display: block; }
        .answers-section { margin-top: 15px; border-top: 2px solid #e2e8f0; padding-top: 15px; }
        .answer-item { background: #f1f5f9; padding: 6px 12px; border-radius: 8px; margin: 4px 0; }
        .name-prompt { background: #f8fafc; padding: 15px; border-radius: 14px; margin: 10px 0; display: none; border: 2px solid #3b82f6; }
        .name-prompt .input-group { display: flex; gap: 10px; margin-top: 8px; }
        .name-prompt .input-group input { flex: 1; margin: 0; }
        @media (max-width: 600px) { .container { padding: 15px; } .question-input-group { flex-direction: column; } .room-box { flex-direction: column; } .name-prompt .input-group { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 منصة الدرس التفاعلية</h1>

    <div class="room-box">
        <input type="text" id="roomInput" placeholder="كود الغرفة (مثال: phys3)" />
        <button class="btn btn-primary" id="teacherBtn">👨‍🏫 معلم</button>
        <button class="btn btn-success" id="studentBtn">🧑‍🎓 طالب</button>
    </div>
    <div id="statusMsg" class="msg"></div>

    <!-- وضع المعلم -->
    <div id="teacherMode" class="teacher-view">
        <span class="badge">👩‍🏫 المعلم - الغرفة: <span id="teacherRoom"></span></span>
        <label>📖 عنوان الدرس</label>
        <input type="text" id="lessonTitle" placeholder="مثال: درس الدفع" />
        <label>📝 ملخص الدرس</label>
        <textarea id="lessonSummary" placeholder="اكتب الملخص هنا..."></textarea>
        <div class="question-area">
            <label>❓ أسئلة الواجب</label>
            <div class="question-input-group">
                <input type="text" id="questionInput" placeholder="اكتب السؤال..." />
                <button class="btn btn-primary" id="addBtn">➕ أضف</button>
            </div>
            <ul id="questionsList"></ul>
        </div>
        <button class="btn btn-success" id="saveBtn">💾 حفظ الدرس</button>
        <div class="answers-section">
            <h4>📨 إجابات الطلاب</h4>
            <div id="answersContainer">لا توجد إجابات بعد.</div>
        </div>
        <button class="btn btn-danger" id="clearLocalBtn" style="margin-top:10px;">🗑️ مسح بيانات الطالب</button>
    </div>

    <!-- وضع الطالب -->
    <div id="studentMode" class="student-view">
        <span class="badge">🧑‍🎓 الطالب - الغرفة: <span id="studentRoom"></span></span>
        <div id="namePrompt" class="name-prompt">
            <label style="font-weight:600;">👤 أدخل اسمك (سيظهر مع إجابتك):</label>
            <div class="input-group">
                <input type="text" id="studentNameInput" placeholder="مثال: أحمد محمد" />
                <button class="btn btn-primary" id="nameSubmitBtn">✅ حفظ الاسم</button>
            </div>
        </div>
        <div id="studentTitle" style="font-size:22px;margin-top:10px;"></div>
        <div class="summary-box" id="studentSummary"></div>
        <div id="studentQuestions"></div>
        <div id="studentStatus" style="margin-top:10px;color:#4b5563;"></div>
    </div>
</div>

<script>
    // ============================================================
    // 1. تهيئة Firebase (ضع بياناتك هنا)
    // ============================================================
    const firebaseConfig = {


  apiKey: "AIzaSyBGHfqTJF-XE-sFTZeQa4H6hin7zD698YY",


  authDomain: "learning-platform-3034b.firebaseapp.com",


  databaseURL: "https://learning-platform-3034b-default-rtdb.europe-west1.firebasedatabase.app",


  projectId: "learning-platform-3034b",


  storageBucket: "learning-platform-3034b.firebasestorage.app",


  messagingSenderId: "846645004823",


  appId: "1:846645004823:web:8b90ced21fb6f468cdea52"


};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================
    // 2. المتغيرات
    // ============================================================
    let currentRoom = '';
    let questions = [];
    let teacherListener = null;
    let answerListener = null;

    // ============================================================
    // 3. المراجع
    // ============================================================
    const roomInput = document.getElementById('roomInput');
    const teacherBtn = document.getElementById('teacherBtn');
    const studentBtn = document.getElementById('studentBtn');
    const teacherMode = document.getElementById('teacherMode');
    const studentMode = document.getElementById('studentMode');
    const statusMsg = document.getElementById('statusMsg');
    const teacherRoom = document.getElementById('teacherRoom');
    const studentRoom = document.getElementById('studentRoom');
    const lessonTitle = document.getElementById('lessonTitle');
    const lessonSummary = document.getElementById('lessonSummary');
    const questionInput = document.getElementById('questionInput');
    const addBtn = document.getElementById('addBtn');
    const questionsList = document.getElementById('questionsList');
    const saveBtn = document.getElementById('saveBtn');
    const answersContainer = document.getElementById('answersContainer');
    const studentTitle = document.getElementById('studentTitle');
    const studentSummary = document.getElementById('studentSummary');
    const studentQuestions = document.getElementById('studentQuestions');
    const studentStatus = document.getElementById('studentStatus');
    const clearLocalBtn = document.getElementById('clearLocalBtn');
    const namePrompt = document.getElementById('namePrompt');
    const studentNameInput = document.getElementById('studentNameInput');
    const nameSubmitBtn = document.getElementById('nameSubmitBtn');

    // ============================================================
    // 4. دوال مساعدة
    // ============================================================
    function showMsg(text, type = 'success') {
        statusMsg.textContent = text;
        statusMsg.className = 'msg ' + type;
        statusMsg.style.display = 'block';
        setTimeout(() => statusMsg.style.display = 'none', 4000);
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // ============================================================
    // 5. المعلم (يعمل ببساطة)
    // ============================================================
    function loadTeacher(room) {
        if (teacherListener) { teacherListener.off(); teacherListener = null; }
        if (answerListener) { answerListener.off(); answerListener = null; }

        currentRoom = room;
        teacherMode.style.display = 'block';
        studentMode.style.display = 'none';
        teacherRoom.textContent = room;

        // قراءة بيانات المعلم
        teacherListener = db.ref('rooms/' + room + '/teacher');
        teacherListener.on('value', snap => {
            const data = snap.val();
            if (data) {
                lessonTitle.value = data.title || '';
                lessonSummary.value = data.summary || '';
                questions = data.questions || [];
                renderQuestions();
            } else {
                lessonTitle.value = '';
                lessonSummary.value = '';
                questions = [];
                renderQuestions();
            }
        });

        // قراءة إجابات الطلاب
        answerListener = db.ref('rooms/' + room + '/answers');
        answerListener.on('value', snap => {
            const all = snap.val();
            if (!all) { answersContainer.innerHTML = 'لا توجد إجابات.'; return; }
            let html = '';
            Object.keys(all).forEach(sid => {
                const entry = all[sid];
                const name = entry.name || 'طالب';
                const ans = entry.answers || {};
                html += `<div style="border-bottom:1px solid #e2e8f0;padding:6px 0;"><strong>👤 ${name}</strong>`;
                for (let i = 0; i < questions.length; i++) {
                    html += `<div class="answer-item">س${i+1}: ${ans[i] || '(لم يجب)'}</div>`;
                }
                html += '</div>';
            });
            answersContainer.innerHTML = html;
        });
    }

    function renderQuestions() {
        if (!questions.length) {
            questionsList.innerHTML = '<li style="color:#94a3b8;border:none;">📭 لا توجد أسئلة</li>';
            return;
        }
        questionsList.innerHTML = questions.map((q, i) => `
            <li>
                <span class="q-num">${i+1}</span>
                <span class="q-text">${escapeHtml(q.text)}</span>
                <button class="btn btn-danger" onclick="removeQ(${i})">✖</button>
            </li>
        `).join('');
    }

    window.removeQ = function(index) {
        questions.splice(index, 1);
        renderQuestions();
    };

    function saveLesson() {
        if (!currentRoom) { showMsg('⚠️ حدد الغرفة أولاً', 'error'); return; }
        db.ref('rooms/' + currentRoom + '/teacher').set({
            title: lessonTitle.value.trim(),
            summary: lessonSummary.value.trim(),
            questions: questions
        }).then(() => showMsg('✅ تم حفظ الدرس بنجاح')).catch(err => showMsg('❌ خطأ: ' + err.message, 'error'));
    }

    // ============================================================
    // 6. الطالب (الحل المبني على once() لتجنب التعليق)
    // ============================================================
    function loadStudent(room) {
        if (teacherListener) { teacherListener.off(); teacherListener = null; }
        if (answerListener) { answerListener.off(); answerListener = null; }

        currentRoom = room;
        teacherMode.style.display = 'none';
        studentMode.style.display = 'block';
        studentRoom.textContent = room;

        let studentName = localStorage.getItem('studentName_' + room);

        if (studentName) {
            namePrompt.style.display = 'none';
            fetchStudentData(room);
        } else {
            namePrompt.style.display = 'block';
            studentNameInput.value = '';
            // تجنب تراكم المستمعات
            nameSubmitBtn.onclick = function() {
                const name = studentNameInput.value.trim();
                if (!name) { alert('الرجاء كتابة اسمك'); return; }
                localStorage.setItem('studentName_' + room, name);
                namePrompt.style.display = 'none';
                fetchStudentData(room);
            };
            studentTitle.textContent = '👋 مرحباً! أدخل اسمك أولاً';
            studentSummary.textContent = '';
            studentQuestions.innerHTML = '';
            studentStatus.textContent = '';
        }
    }

    function fetchStudentData(room) {
        studentTitle.textContent = '⏳ جاري تحميل الدرس...';
        studentSummary.textContent = '';
        studentQuestions.innerHTML = '';
        studentStatus.textContent = '';

        // استخدام once() لجلب البيانات (كما نجح في الاختبار)
        db.ref('rooms/' + room + '/teacher').once('value').then(snapshot => {
            const data = snapshot.val();

            if (!data) {
                studentTitle.textContent = '⚠️ لم ينشئ المعلم الدرس بعد.';
                studentSummary.textContent = 'انتظر حتى يحفظ المعلم المحتوى.';
                studentQuestions.innerHTML = '';
                studentStatus.textContent = '';
                return;
            }

            // عرض البيانات
            studentTitle.textContent = data.title || 'عنوان الدرس';
            studentSummary.textContent = data.summary || 'لا يوجد ملخص.';
            const qs = data.questions || [];

            if (!qs.length) {
                studentQuestions.innerHTML = '<p style="color:#94a3b8;">📭 لا توجد أسئلة.</p>';
                studentStatus.textContent = '';
                return;
            }

            let html = '';
            qs.forEach((q, i) => {
                html += `
                    <div class="student-question-item">
                        <div><span class="num">سؤال ${i+1}:</span> ${escapeHtml(q.text)}</div>
                        <div class="answer-box">
                            <textarea id="ans_${i}" placeholder="اكتب إجابتك هنا..." rows="2"></textarea>
                        </div>
                    </div>
                `;
            });
            html += `<button class="btn btn-success" id="submitBtn" style="margin-top:10px;">📨 إرسال الإجابات</button>`;
            studentQuestions.innerHTML = html;
            studentStatus.textContent = '🔹 يمكنك إرسال إجاباتك (سيظهر تحديث للمعلم)';

            // زر الإرسال
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.onclick = function() {
                const answers = {};
                for (let i = 0; i < qs.length; i++) {
                    const ta = document.getElementById('ans_' + i);
                    if (ta) answers[i] = ta.value.trim();
                }
                const studentName = localStorage.getItem('studentName_' + room) || 'طالب';
                let studentId = localStorage.getItem('studentId_' + room);
                if (!studentId) {
                    studentId = 's_' + Date.now() + '_' + Math.random().toString(36).substring(2,5);
                    localStorage.setItem('studentId_' + room, studentId);
                }
                db.ref('rooms/' + room + '/answers/' + studentId).set({
                    name: studentName,
                    answers: answers
                }).then(() => showMsg('✅ تم إرسال إجاباتك')).catch(err => showMsg('❌ خطأ: ' + err.message, 'error'));
            };

        }).catch(err => {
            studentTitle.textContent = '⚠️ خطأ في الاتصال';
            studentSummary.textContent = 'تأكد من اتصالك بالإنترنت وحاول مرة أخرى.';
            studentQuestions.innerHTML = '';
            studentStatus.textContent = '';
            console.error(err);
        });
    }

    // ============================================================
    // 7. أحداث الأزرار
    // ============================================================
    teacherBtn.onclick = function() {
        const room = roomInput.value.trim();
        if (!room) { showMsg('⚠️ أدخل كود الغرفة', 'error'); return; }
        loadTeacher(room);
        showMsg('✅ دخلت كمعلم في الغرفة ' + room);
    };

    studentBtn.onclick = function() {
        const room = roomInput.value.trim();
        if (!room) { showMsg('⚠️ أدخل كود الغرفة', 'error'); return; }
        loadStudent(room);
        showMsg('✅ دخلت كطالب في الغرفة ' + room);
    };

    addBtn.onclick = function() {
        const text = questionInput.value.trim();
        if (!text) { showMsg('⚠️ اكتب السؤال أولاً', 'error'); return; }
        questions.push({ text });
        questionInput.value = '';
        renderQuestions();
        showMsg('✅ تمت إضافة السؤال');
    };

    saveBtn.onclick = saveLesson;

    clearLocalBtn.onclick = function() {
        if (!confirm('مسح بيانات الطالب المحفوظة (الاسم والمعرف)؟')) return;
        localStorage.removeItem('studentName_' + currentRoom);
        localStorage.removeItem('studentId_' + currentRoom);
        showMsg('✅ تم مسح البيانات المحلية');
        if (studentMode.style.display === 'block') {
            loadStudent(currentRoom);
        }
    };

    // ============================================================
    // 8. بدء التشغيل
    // ============================================================
    teacherMode.style.display = 'none';
    studentMode.style.display = 'none';
    if (firebaseConfig.apiKey === 'AIzaSy...') {
        showMsg('⚠️ يرجى تهيئة Firebase في الكود (انظر تعليمات الإعداد)', 'error');
    }
    console.log('✅ التطبيق جاهز، استخدم كود الغرفة للتواصل.');
</script>
</body>
</html>
